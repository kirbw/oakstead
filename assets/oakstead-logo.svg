<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" role="img" aria-labelledby="title desc">
  <title id="title">Oakstead logo</title>
  <desc id="desc">Oakstead wordmark with tree emblem</desc>
  <defs>
    <linearGradient id="oak" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#567a24"/>
      <stop offset="1" stop-color="#2f4f1e"/>
    </linearGradient>
    <linearGradient id="earth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f4219"/>
      <stop offset="1" stop-color="#4e2a12"/>
    </linearGradient>
  </defs>
  <g transform="translate(12,10)">
    <ellipse cx="86" cy="56" rx="78" ry="40" fill="url(#oak)" opacity="0.95"/>
    <rect x="74" y="70" width="24" height="46" rx="7" fill="url(#earth)"/>
    <path d="M10 120 C42 100, 128 100, 162 120" fill="none" stroke="#6b7f32" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text x="190" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" fill="#315a20">Oakstead</text>
  <text x="194" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-style="italic" fill="#4f2b17">Rooted Records for Growing Minds</text>
</svg>
